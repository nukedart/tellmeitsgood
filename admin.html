<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Tell Me It's Good</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF8F5; --surface: #F3F0EB; --surface-2: #EAE6DF;
      --border: #DDD9D2; --border-strong: #C8C3BB;
      --text: #1C1917; --text-2: #6B6560; --text-3: #A09891;
      --accent: #2F6FED; --accent-hover: #1A57D4; --accent-surf: #EBF1FD; --accent-text: #1A4FB8;
      --card: #FFFFFF; --success: #3A9E6F; --success-surf: #ECFDF5;
      --warning: #D4872A; --warning-surf: #FFF7ED;
      --danger: #D94F4F; --danger-surf: #FEF2F2;
      --pro: #7C3AED; --pro-surf: #F5F3FF;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --topbar-h: 56px;
      --sidebar-w: 216px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18161A; --surface: #211F24; --surface-2: #2B2830;
        --border: #38343D; --border-strong: #49444F;
        --text: #F0EDE8; --text-2: #9B9299; --text-3: #67636B;
        --accent: #5A8FFF; --accent-surf: #1C2744; --accent-text: #8AB4FF;
        --card: #211F24; --success: #4CB87F; --success-surf: #0D2B1E;
        --warning: #E09640; --warning-surf: #2B1E0D;
        --danger: #E86060; --danger-surf: #2B1212;
        --pro: #A78BFA; --pro-surf: #1E1533;
        --shadow-md: 0 4px 12px rgba(0,0,0,.3);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Top bar ── */
    .top-bar {
      position: sticky; top: 0; z-index: 30;
      width: 100%; height: var(--topbar-h);
      padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .top-bar-logo { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .top-bar-logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .top-bar-right { display: flex; align-items: center; gap: 14px; }
    .top-bar-badge { font-size: 11px; font-weight: 700; letter-spacing: .05em; background: var(--danger-surf); color: var(--danger); padding: 3px 9px; border-radius: 100px; text-transform: uppercase; }
    .top-bar-link { font-size: 13px; font-weight: 500; color: var(--text-2); text-decoration: none; }
    .top-bar-link:hover { color: var(--text); }
    .top-bar-site-btn { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--accent); background: var(--accent-surf); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 6px 14px; text-decoration: none; white-space: nowrap; transition: background .15s; }
    .top-bar-site-btn:hover { background: var(--accent); color: #fff; }

    /* ── Shell ── */
    .shell {
      display: flex;
      min-height: calc(100vh - var(--topbar-h));
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      position: sticky;
      top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
      overflow-y: auto;
      padding: 20px 12px 40px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
      color: var(--text-3); padding: 18px 8px 6px; margin-top: 2px;
    }
    .sidebar-section-label:first-child { padding-top: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text-2); background: none; border: none;
      border-radius: var(--radius-md); padding: 9px 10px;
      cursor: pointer; width: 100%; text-align: left;
      transition: background .12s, color .12s;
    }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: var(--accent-surf); color: var(--accent-text); font-weight: 600; }
    .nav-item.active .nav-icon { color: var(--accent); }
    .nav-icon { font-size: 15px; flex-shrink: 0; width: 18px; text-align: center; color: var(--text-3); }

    /* ── Main content ── */
    .main { flex: 1; min-width: 0; padding: 32px 28px 80px; }
    @media (min-width: 900px) { .main { padding: 36px 40px 80px; } }

    /* Mobile: sidebar becomes horizontal scroll strip */
    @media (max-width: 680px) {
      .shell { flex-direction: column; }
      .sidebar {
        width: 100%; height: auto; position: static;
        flex-direction: row; flex-wrap: nowrap;
        overflow-x: auto; overflow-y: hidden;
        padding: 8px 12px; gap: 4px;
        border-right: none; border-bottom: 1px solid var(--border);
      }
      .sidebar-section-label { display: none; }
      .nav-item { white-space: nowrap; flex-shrink: 0; padding: 7px 12px; }
      .nav-icon { display: none; }
      .main { padding: 20px 16px 60px; }
    }

    /* ── Stat grid ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .stat-value { font-family: var(--font-display); font-size: 34px; color: var(--text); line-height: 1; margin-bottom: 5px; }
    .stat-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); }
    .stat-sub { font-size: 12px; color: var(--success); margin-top: 4px; }
    .stat-sub.warn { color: var(--warning); }
    .stat-sub.pro { color: var(--pro); }

    /* ── Section ── */
    .section { margin-bottom: 32px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
    .page-title { font-family: var(--font-display); font-size: 24px; color: var(--text); margin-bottom: 24px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Breakdown card ── */
    .breakdown-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .breakdown-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .breakdown-row:last-child { border-bottom: none; padding-bottom: 0; }
    .breakdown-row:first-child { padding-top: 0; }
    .breakdown-key { color: var(--text); font-weight: 500; min-width: 0; flex-shrink: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .breakdown-val { font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .breakdown-bar-wrap { flex: 1; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

    /* ── Badge pill ── */
    .badge-pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 3px 8px; border-radius: 100px; flex-shrink: 0; }
    .badge-pill.TELL_ME_ITS_GOOD { background: var(--success-surf); color: var(--success); }
    .badge-pill.CLEAN_PICK       { background: #ECFDF5; color: #0F6E56; }
    .badge-pill.ETHICAL_PICK     { background: #EEF2FF; color: #4338CA; }
    .badge-pill.QUALITY_PICK     { background: var(--accent-surf); color: var(--accent-text); }
    .badge-pill.NOT_LISTED       { background: var(--danger-surf); color: var(--danger); }
    @media (prefers-color-scheme: dark) {
      .badge-pill.CLEAN_PICK   { background: #0D2B1E; color: #4CB87F; }
      .badge-pill.ETHICAL_PICK { background: #1E1B4B; color: #A5B4FC; }
    }

    /* ── Table ── */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-row { display: grid; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .table-row:last-child { border-bottom: none; }
    .table-row.header { background: var(--surface); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); padding: 9px 18px; }
    .cell-name { font-weight: 500; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cell-name a { color: var(--accent); text-decoration: none; }
    .cell-name a:hover { text-decoration: underline; }
    .cell-score { font-weight: 700; color: var(--text-2); text-align: right; }
    .cell-muted { color: var(--text-3); font-size: 12px; }
    .cell-pro { font-size: 11px; font-weight: 700; color: var(--pro); background: var(--pro-surf); padding: 2px 8px; border-radius: 100px; display: inline-block; }
    .cell-free { font-size: 11px; color: var(--text-3); }

    .row-product { grid-template-columns: 110px minmax(0,1fr) 48px 120px 80px 80px; }
    .row-user    { grid-template-columns: minmax(0,1fr) 100px 100px 70px; }
    .row-search  { grid-template-columns: 110px minmax(0,1fr) 60px; }
    @media (max-width: 640px) {
      .row-product { grid-template-columns: 80px minmax(0,1fr) 40px 60px; }
      .row-product .col-cat, .row-product .col-action { display: none; }
      .row-user { grid-template-columns: minmax(0,1fr) 80px 60px; }
      .row-user .col-last { display: none; }
    }

    /* ── Search bar ── */
    .search-wrap { margin-bottom: 14px; display: flex; gap: 10px; }
    .search-input { flex: 1; font-family: var(--font-body); font-size: 14px; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 9px 14px; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-3); }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; font-size: 13px; color: var(--text-3); }
    .pag-btn { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--accent); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; transition: background .15s; }
    .pag-btn:hover { background: var(--accent-surf); }
    .pag-btn:disabled { color: var(--text-3); cursor: default; background: none; }

    /* ── Sparkline ── */
    .spark-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .spark-chart { display: flex; align-items: flex-end; gap: 4px; height: 64px; margin-bottom: 8px; }
    .spark-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
    .spark-bar { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; }
    .spark-label { font-size: 9px; color: var(--text-3); text-align: center; }
    .spark-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* ── Cost cards ── */
    .cost-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .cost-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .cost-val { font-family: var(--font-display); font-size: 28px; color: var(--text); margin-bottom: 4px; }
    .cost-label { font-size: 12px; color: var(--text-3); }
    .cost-note { font-size: 11px; color: var(--success); margin-top: 4px; }

    /* ── Buttons ── */
    .action-btn { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--accent); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .action-btn:hover { background: var(--accent-surf); }
    .action-btn.sent { color: var(--success); border-color: var(--success); pointer-events: none; }
    .refresh-btn { font-size: 12px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .refresh-btn:hover { text-decoration: underline; }
    .primary-btn { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: var(--radius-md); padding: 12px 28px; cursor: pointer; transition: background .15s; }
    .primary-btn:hover { background: var(--accent-hover); }
    .primary-btn:disabled { opacity: .6; cursor: default; }

    /* ── Loading / state ── */
    .state-center { text-align: center; padding: 64px 24px; }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title { font-family: var(--font-display); font-size: 20px; color: var(--text); margin-bottom: 6px; }
    .state-text { font-size: 14px; color: var(--text-2); }

    /* ── Form elements ── */
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .form-input { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 11px 14px; outline: none; transition: border-color .15s; }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-3); }
    .form-textarea { width: 100%; font-family: var(--font-body); font-size: 13px; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 11px 14px; outline: none; resize: vertical; line-height: 1.6; transition: border-color .15s; }
    .form-textarea:focus { border-color: var(--accent); }
    .form-textarea::placeholder { color: var(--text-3); }
    .form-group { display: flex; flex-direction: column; gap: 14px; }

    /* ── Notice boxes ── */
    .notice { border-radius: var(--radius-lg); padding: 16px 20px; font-size: 13px; line-height: 1.6; }
    .notice.success { background: var(--success-surf); border: 1px solid var(--success); color: var(--success); }
    .notice.danger  { background: var(--danger-surf);  border: 1px solid var(--danger);  color: var(--danger); }
    .notice.info    { background: var(--surface); border: 1px solid var(--border); color: var(--text-2); }
    .notice-title   { font-weight: 700; margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="top-bar-logo" href="/">
    <div class="top-bar-logo-dot"></div>
    Tell Me It's Good
  </a>
  <div class="top-bar-right">
    <span class="top-bar-badge">Admin</span>
    <a class="top-bar-link" href="/directory">Directory</a>
    <a class="top-bar-site-btn" href="/">← View site</a>
  </div>
</div>

<div class="shell">
  <!-- ── Sidebar nav ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Dashboard</div>
    <button class="nav-item active" data-tab="overview">
      <span class="nav-icon">◈</span> Overview
    </button>
    <button class="nav-item" data-tab="products">
      <span class="nav-icon">⊞</span> Products
    </button>
    <button class="nav-item" data-tab="users">
      <span class="nav-icon">◯</span> Users
    </button>
    <button class="nav-item" data-tab="searches">
      <span class="nav-icon">⌕</span> Searches
    </button>
    <button class="nav-item" data-tab="cost">
      <span class="nav-icon">$</span> Cost
    </button>

    <div class="sidebar-section-label">Tools</div>
    <button class="nav-item" data-tab="import">
      <span class="nav-icon">↓</span> Import
    </button>
  </nav>

  <!-- ── Main content ── -->
  <main class="main">
    <div id="content">
      <div class="state-center">
        <div class="spinner"></div>
        <div class="state-title">Loading…</div>
      </div>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL      = 'https://idypfzpfrgvtkypasqhl.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_SNwAYSpiLmXrZYdK-0P7uA_mrDiF8wb';

  // Same storage adapter as index.html — must be identical or session keys mismatch
  const _authStorage = (() => {
    const k = '_sb_probe_';
    try { localStorage.setItem(k, '1'); localStorage.removeItem(k); return localStorage; } catch {}
    try { sessionStorage.setItem(k, '1'); sessionStorage.removeItem(k); return sessionStorage; } catch {}
    const _m = new Map();
    return { getItem: k => _m.get(k) ?? null, setItem: (k,v) => _m.set(k,v), removeItem: k => _m.delete(k) };
  })();

  const _SB_STORAGE_KEY = 'sb-idypfzpfrgvtkypasqhl-auth-token';

  // Brave-safe lock — mirrors index.html implementation exactly
  const _lock = (() => {
    const _queues = {};
    const _inMemory = (name, fn) => {
      if (!_queues[name]) _queues[name] = Promise.resolve();
      const next = _queues[name].then(() => fn(), () => fn());
      _queues[name] = next.then(() => {}, () => {});
      return next;
    };
    const hasLocks = typeof navigator !== 'undefined' &&
      typeof navigator.locks?.request === 'function';
    if (!hasLocks) return _inMemory;
    return async (name, acquireTimeout, fn) => {
      const opts = {};
      let timer;
      if (acquireTimeout >= 0) {
        const ctrl = new AbortController();
        timer = setTimeout(() => ctrl.abort(), acquireTimeout);
        opts.signal = ctrl.signal;
      }
      try {
        return await navigator.locks.request(name, opts, () => { clearTimeout(timer); return fn(); });
      } catch { clearTimeout(timer); return _inMemory(name, fn); }
    };
  })();

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession:      true,
      autoRefreshToken:    true,
      broadcastAuthEvents: false,
      storage:             _authStorage,
      storageKey:          _SB_STORAGE_KEY,
      detectSessionInUrl:  false,
      lock:                _lock,
    },
  });

  window.addEventListener('beforeunload', () => supabaseClient.auth.stopAutoRefresh());

  let _session  = null;
  let _tab      = 'overview';
  let _cache    = {};
  let _prodPage = 0;
  let _prodQ    = '';

  // ── Helpers ─────────────────────────────────────────────────────
  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function timeAgo(iso) {
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 60)   return m < 2 ? 'just now' : `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24)   return `${h}h ago`;
    const d = Math.floor(h / 24);
    return d === 1 ? '1d ago' : `${d}d ago`;
  }

  function shortDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  }

  function badgePill(b) {
    return b ? `<span class="badge-pill ${esc(b)}">${esc(b).replace(/_/g,' ')}</span>` : '<span class="cell-muted">—</span>';
  }

  function setLoading() {
    document.getElementById('content').innerHTML = `<div class="state-center"><div class="spinner"></div></div>`;
  }

  async function api(path) {
    const r = await fetch(path, { headers: { 'Authorization': `Bearer ${_session.access_token}` } });
    if (r.status === 500) {
      const d = await r.json().catch(() => ({}));
      throw new Error('misconfigured:' + (d.missing || []).join(','));
    }
    if (r.status === 401 || r.status === 403) throw new Error('unauthorized');
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ── Auth ─────────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { showGate('not-signed-in'); return; }
    _session = session;
    supabaseClient.auth.onAuthStateChange((ev, s) => { if (s) _session = s; });
    try { sessionStorage.setItem('_isAdmin', '1'); } catch {}
    setupNav();
    loadTab('overview');
  }

  function showGate(type) {
    document.getElementById('content').innerHTML = type === 'not-signed-in'
      ? `<div class="state-center"><div class="state-title">Not signed in</div><p class="state-text">Sign in at <a href="/" style="color:var(--accent)">the home page</a> first.</p></div>`
      : `<div class="state-center"><div class="state-title">Access denied</div><p class="state-text">This page is restricted to admins.</p></div>`;
  }

  // ── Sidebar nav ──────────────────────────────────────────────────
  function setupNav() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _tab = btn.dataset.tab;
        loadTab(_tab);
      });
    });
  }

  async function loadTab(tab, force) {
    if (tab === 'import') { renderTab('import', null); return; }
    if (_cache[tab] && !force) { renderTab(tab, _cache[tab]); return; }
    setLoading();
    try {
      let data;
      if (tab === 'overview') data = await api('/api/admin-stats');
      else if (tab === 'products') data = await api(`/api/admin-stats?view=products&page=${_prodPage}&q=${encodeURIComponent(_prodQ)}`);
      else if (tab === 'users')    data = await api('/api/admin-stats?view=users');
      else if (tab === 'searches') data = await api('/api/admin-stats?view=searches');
      else if (tab === 'cost')     data = _cache['overview'] || await api('/api/admin-stats');

      if (tab !== 'products') _cache[tab] = data;
      renderTab(tab, data);
    } catch (err) {
      if (err.message === 'unauthorized') { showGate('forbidden'); return; }
      if (err.message.startsWith('misconfigured:')) {
        const vars = err.message.slice(14).split(',').filter(Boolean);
        const rows = vars.map(v => `<code style="display:block;margin:6px 0;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:monospace;color:var(--danger)">${esc(v)}</code>`).join('');
        document.getElementById('content').innerHTML = `<div class="state-center">
          <div class="state-title">Setup required</div>
          <p class="state-text" style="margin-bottom:16px">Add to <strong>Vercel → Settings → Environment Variables</strong>, then redeploy:</p>
          ${rows}
        </div>`;
        return;
      }
      document.getElementById('content').innerHTML = `<div class="state-center"><div class="state-title">Error</div><p class="state-text">${esc(err.message)}</p></div>`;
    }
  }

  function renderTab(tab, d) {
    const el = document.getElementById('content');
    if (tab === 'overview')  el.innerHTML = renderOverview(d);
    if (tab === 'products')  el.innerHTML = renderProducts(d);
    if (tab === 'users')     el.innerHTML = renderUsers(d);
    if (tab === 'searches')  el.innerHTML = renderSearches(d);
    if (tab === 'cost')      el.innerHTML = renderCost(d);
    if (tab === 'import')    el.innerHTML = renderImport();
    attachHandlers(tab, d);
  }

  // ── Overview ─────────────────────────────────────────────────────
  function renderOverview(d) {
    const convRate = d.totalUsers > 0 ? ((d.proUsers / d.totalUsers) * 100).toFixed(1) : '0';

    const catEntries = Object.entries(d.categoryBreakdown || {}).sort((a,b) => b[1]-a[1]);
    const catMax     = catEntries[0]?.[1] || 1;
    const catRows    = catEntries.map(([k,v]) => `
      <div class="breakdown-row">
        <span class="breakdown-key">${esc(k)}</span>
        <div class="breakdown-bar-wrap"><div class="breakdown-bar-fill" style="width:${Math.round(v/catMax*100)}%"></div></div>
        <span class="breakdown-val">${v}</span>
      </div>`).join('') || '<div class="breakdown-row"><span class="cell-muted">No data</span></div>';

    const badgeOrder  = ['TELL_ME_ITS_GOOD','CLEAN_PICK','ETHICAL_PICK','QUALITY_PICK','NOT_LISTED'];
    const badgeEntries = Object.entries(d.badgeBreakdown || {}).sort((a,b) => badgeOrder.indexOf(a[0]) - badgeOrder.indexOf(b[0]));
    const badgeMax    = badgeEntries[0]?.[1] || 1;
    const badgeRows   = badgeEntries.map(([k,v]) => `
      <div class="breakdown-row">
        ${badgePill(k)}
        <div class="breakdown-bar-wrap"><div class="breakdown-bar-fill" style="width:${Math.round(v/badgeMax*100)}%"></div></div>
        <span class="breakdown-val">${v}</span>
      </div>`).join('') || '<div class="breakdown-row"><span class="cell-muted">No data</span></div>';

    const recentRows = (d.recentProducts || []).map(p => `
      <div class="table-row row-product">
        ${badgePill(p.badge)}
        <span class="cell-name"><a href="/p/${esc(p.slug)}" target="_blank">${esc(p.product_name)}</a></span>
        <span class="cell-score">${p.overall_score ?? '—'}</span>
        <span class="cell-muted col-cat">${esc(p.category || '—')}</span>
        <span class="cell-muted">${timeAgo(p.researched_at)}</span>
        <span></span>
      </div>`).join('') || '<div class="table-row"><span class="cell-muted">No products yet</span></div>';

    return `
      <div class="page-title">Overview</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value">${d.totalProducts}</div>
          <div class="stat-label">Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${d.totalUsers}</div>
          <div class="stat-label">Users</div>
          <div class="stat-sub">+${d.newUsersCount} this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${d.proUsers ?? '—'}</div>
          <div class="stat-label">Pro users</div>
          <div class="stat-sub pro">${convRate}% conversion</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${d.searches7d ?? '—'}</div>
          <div class="stat-label">Searches 7d</div>
          <div class="stat-sub">${d.searches30d ?? '—'} last 30d</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${d.totalBookmarks ?? '—'}</div>
          <div class="stat-label">Bookmarks</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">Recent products</span>
          <button class="refresh-btn" onclick="loadTab('overview',true)">↻ Refresh</button>
        </div>
        <div class="table-card">
          <div class="table-row header row-product">
            <span>Badge</span><span>Product</span><span>Score</span>
            <span class="col-cat">Category</span><span>Age</span><span></span>
          </div>
          ${recentRows}
        </div>
      </div>

      <div class="two-col section">
        <div>
          <div class="section-title" style="margin-bottom:12px">By category</div>
          <div class="breakdown-card">${catRows}</div>
        </div>
        <div>
          <div class="section-title" style="margin-bottom:12px">By badge</div>
          <div class="breakdown-card">${badgeRows}</div>
        </div>
      </div>`;
  }

  // ── Products ──────────────────────────────────────────────────────
  function renderProducts(d) {
    const totalPages = Math.ceil((d.total || 0) / (d.limit || 50));
    const rows = (d.products || []).map(p => `
      <div class="table-row row-product">
        ${badgePill(p.badge)}
        <span class="cell-name"><a href="/p/${esc(p.slug)}" target="_blank">${esc(p.product_name || p.slug)}</a></span>
        <span class="cell-score">${p.overall_score ?? '—'}</span>
        <span class="cell-muted col-cat">${esc(p.category || '—')}</span>
        <span class="cell-muted">${timeAgo(p.researched_at)}</span>
        <button class="action-btn col-action" data-slug="${esc(p.slug)}" onclick="requestRefresh(this)">Refresh</button>
      </div>`).join('') || '<div class="table-row" style="padding:20px 18px"><span class="cell-muted">No products found</span></div>';

    return `
      <div class="page-title">Products</div>
      <div class="search-wrap">
        <input class="search-input" id="prodSearch" placeholder="Search products…" value="${esc(_prodQ)}" />
      </div>
      <div class="table-card">
        <div class="table-row header row-product">
          <span>Badge</span><span>Product</span><span>Score</span>
          <span class="col-cat">Category</span><span>Age</span><span class="col-action"></span>
        </div>
        ${rows}
      </div>
      <div class="pagination">
        <span>${d.total ?? 0} products · page ${(d.page || 0) + 1} of ${totalPages || 1}</span>
        <div style="display:flex;gap:8px">
          <button class="pag-btn" ${_prodPage === 0 ? 'disabled' : ''} onclick="changePage(-1)">← Prev</button>
          <button class="pag-btn" ${_prodPage >= totalPages - 1 ? 'disabled' : ''} onclick="changePage(1)">Next →</button>
        </div>
      </div>`;
  }

  function attachHandlers(tab) {
    if (tab === 'products') {
      const inp = document.getElementById('prodSearch');
      if (inp) {
        let t;
        inp.addEventListener('input', e => {
          clearTimeout(t);
          t = setTimeout(() => { _prodQ = e.target.value; _prodPage = 0; loadTab('products', true); }, 350);
        });
      }
    }
  }

  function changePage(delta) {
    _prodPage = Math.max(0, _prodPage + delta);
    loadTab('products', true);
  }

  async function requestRefresh(btn) {
    const slug = btn.dataset.slug;
    btn.textContent = '…';
    btn.disabled = true;
    try {
      const r = await fetch('/api/admin-stats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_session.access_token}` },
        body: JSON.stringify({ slug }),
      });
      btn.textContent = r.ok ? '✓ Sent' : 'Error';
      btn.classList.toggle('sent', r.ok);
    } catch { btn.textContent = 'Error'; }
  }

  // ── Users ─────────────────────────────────────────────────────────
  function renderUsers(d) {
    const rows = (d.users || []).map(u => `
      <div class="table-row row-user">
        <span class="cell-name">${esc(u.email)}</span>
        <span class="cell-muted">${shortDate(u.created_at)}</span>
        <span class="cell-muted col-last">${u.last_sign_in_at ? timeAgo(u.last_sign_in_at) : '—'}</span>
        <span>${u.is_pro ? '<span class="cell-pro">Pro</span>' : '<span class="cell-free">Free</span>'}</span>
      </div>`).join('') || '<div class="table-row"><span class="cell-muted">No users yet</span></div>';

    return `
      <div class="page-title">Users</div>
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-value">${d.total ?? 0}</div>
          <div class="stat-label">Total users</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${d.pro ?? 0}</div>
          <div class="stat-label">Pro users</div>
          <div class="stat-sub pro">${d.total > 0 ? ((d.pro/d.total)*100).toFixed(1) : 0}% conversion</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${(d.total||0) - (d.pro||0)}</div>
          <div class="stat-label">Free users</div>
        </div>
      </div>
      <div class="table-card">
        <div class="table-row header row-user">
          <span>Email</span><span>Joined</span><span class="col-last">Last active</span><span>Plan</span>
        </div>
        ${rows}
      </div>`;
  }

  // ── Searches ──────────────────────────────────────────────────────
  function renderSearches(d) {
    const days   = Object.entries(d.byDay || {});
    const maxVal = Math.max(...days.map(([,v]) => v), 1);
    const bars   = days.map(([date, count]) => {
      const pct   = Math.round((count / maxVal) * 100);
      const label = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="spark-bar-wrap" title="${label}: ${count}">
        <div class="spark-bar" style="height:${Math.max(pct,2)}%"></div>
        <div class="spark-label">${label.split(' ')[1]}</div>
      </div>`;
    }).join('');

    const topRows = (d.topProducts || []).map(p => `
      <div class="table-row row-search">
        ${badgePill(p.badge)}
        <span class="cell-name">${esc(p.name)}</span>
        <span class="breakdown-val">${p.count}</span>
      </div>`).join('') || '<div class="table-row"><span class="cell-muted">No data yet</span></div>';

    const total7d  = days.slice(-7).reduce((s,[,v]) => s+v, 0);
    const total14d = days.reduce((s,[,v]) => s+v, 0);

    return `
      <div class="page-title">Searches</div>
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-value">${d.total ?? 0}</div>
          <div class="stat-label">Tracked searches</div>
          <div class="stat-sub" style="color:var(--text-3)">logged-in users only</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${total7d}</div>
          <div class="stat-label">Last 7 days</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${total14d}</div>
          <div class="stat-label">Last 14 days</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Daily volume — 14 days</div>
        <div class="spark-wrap">
          <div class="spark-chart">${bars}</div>
          <div class="spark-meta">
            <span>${days[0]?.[0] ? new Date(days[0][0]+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</span>
            <span>Today</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Top searched products</div>
        <div class="table-card">
          <div class="table-row header row-search"><span>Badge</span><span>Product</span><span>#</span></div>
          ${topRows}
        </div>
      </div>`;
  }

  // ── Cost ──────────────────────────────────────────────────────────
  function renderCost(d) {
    const totalProducts = d.totalProducts || 0;
    const costPerSearch = 0.009;
    const estTotal = (totalProducts * costPerSearch).toFixed(2);
    const est30d   = ((d.searches30d || 0) * costPerSearch * 0.3).toFixed(2);

    return `
      <div class="page-title">Cost</div>
      <div class="cost-grid">
        <div class="cost-card">
          <div class="cost-val">$${estTotal}</div>
          <div class="cost-label">Est. total API spend</div>
          <div class="cost-note">Based on ${totalProducts} products × ~$0.009</div>
        </div>
        <div class="cost-card">
          <div class="cost-val">~$0.009</div>
          <div class="cost-label">Per new search (cache miss)</div>
          <div class="cost-note">Research + post, combined call</div>
        </div>
        <div class="cost-card">
          <div class="cost-val">~$0.002</div>
          <div class="cost-label">Per cached search</div>
          <div class="cost-note">Prompt cache hit on research</div>
        </div>
        <div class="cost-card">
          <div class="cost-val">$${est30d}</div>
          <div class="cost-label">Est. last 30d spend</div>
          <div class="cost-note">${d.searches30d || 0} searches, ~30% misses</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Token breakdown per call</div>
        <div class="breakdown-card">
          <div class="breakdown-row">
            <span class="breakdown-key">research.js — input</span>
            <span class="cell-muted" style="margin-left:auto;font-size:12px">~1,500 tokens system (cached) + ~500 user</span>
          </div>
          <div class="breakdown-row">
            <span class="breakdown-key">research.js — output (incl. post_narrative)</span>
            <span class="cell-muted" style="margin-left:auto;font-size:12px">~1,600 tokens JSON</span>
          </div>
          <div class="breakdown-row">
            <span class="breakdown-key">Haiku pricing</span>
            <span class="cell-muted" style="margin-left:auto;font-size:12px">$0.80/M input · $4.00/M output · $0.08/M cache read</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Monthly cost at scale</div>
        <div class="breakdown-card">
          ${[
            ['100 searches/mo',    '$0.27'],
            ['500 searches/mo',    '$1.35'],
            ['1,000 searches/mo',  '$2.70'],
            ['5,000 searches/mo',  '$13.50'],
            ['10,000 searches/mo', '$27.00'],
          ].map(([label, cost]) => `
            <div class="breakdown-row">
              <span class="breakdown-key">${label}</span>
              <span class="breakdown-val">${cost}</span>
            </div>`).join('')}
        </div>
        <p style="font-size:12px;color:var(--text-3);margin-top:10px;">Assumes 30% cache miss rate. Pro plan at $14/mo breaks even at ~24 paying users.</p>
      </div>`;
  }

  // ── Import ────────────────────────────────────────────────────────
  function renderImport() {
    return `
      <div class="page-title">Import from Perplexity</div>

      <div class="notice info" style="margin-bottom:24px;">
        Run a Perplexity deep research using the prompt below, then paste the output. Claude Sonnet will format it into the Triple Filter schema and save it to the products database — no web search cost.
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">Perplexity prompt template</span>
          <button onclick="copyPrompt()" style="font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-surf);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:5px 14px;cursor:pointer;">Copy prompt</button>
        </div>
        <div class="breakdown-card" style="padding:0;">
          <pre id="perplexityPrompt" style="font-family:monospace;font-size:12px;color:var(--text-2);white-space:pre-wrap;line-height:1.6;margin:0;padding:18px;overflow-x:auto;">Research: [PRODUCT NAME or "Top 3 [category]" for batch]

For EACH product covered, provide detailed findings for a quality and ethics audit. Label each product clearly (e.g. "## Product 1: Brand Name Model"). Search thoroughly and provide specific evidence with source URLs.

GATE 1 — VALUE &amp; QUALITY
1. Core performance: How well does it actually work? Professional reviews, owner reports, lab tests.
2. Build quality &amp; longevity: Durability over time, common failure points, warranty claims.
3. Price-to-quality ratio: Cost vs comparable alternatives — name specific competitors and price gaps.
4. Honest product claims: Do marketing claims match real-world performance? Any misleading claims?
5. Usability &amp; experience: Day-to-day ease of use, learning curve, maintenance burden.

GATE 2 — CLEAN &amp; SAFE
6. Ingredient safety: Full ingredient list. Flag any EWG Skin Deep scores 7–10. Restricted substances?
7. Full ingredient disclosure: Are all ingredients disclosed? Any vague terms like "fragrance"?
8. No greenwashing: Are "natural," "clean," "eco" claims accurate? Any FTC actions?
9. Safe around kids &amp; pets: Known hazards for sensitive populations.
10. Packaging honesty: Recycling claims accurate? Misleading sustainability marketing?

GATE 3 — ETHICAL COMPANY
11. Supply chain transparency: Where is it made? Is the supply chain disclosed?
12. No major labor violations: Documented worker rights issues, factory audits, living wage.
13. Honest review practices: Amazon review manipulation, paid reviews, FTC complaints.
14. No manipulative marketing: Fear-based or misleading tactics, false comparison claims.
15. Accountability track record: How does the company respond to complaints? BBB rating.

For each criterion provide: your finding, a suggested score (1–10), and the source URL.</pre>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:16px">Paste research &amp; import</div>
        <div class="form-group">
          <div>
            <label class="form-label" for="importResearchTopic">Research topic <span style="font-weight:400;color:var(--text-3)">(optional — e.g. "top 3 chef's knives")</span></label>
            <input class="form-input" id="importResearchTopic" type="text" placeholder="e.g. top 3 chef's knives" />
          </div>
          <div>
            <label class="form-label" for="importResearchText">Perplexity research output</label>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:8px;">Can cover one product or multiple — Claude will detect each and import them all.</p>
            <textarea class="form-textarea" id="importResearchText" rows="18" placeholder="Paste the full Perplexity deep research output here…"></textarea>
          </div>
          <div style="display:flex;align-items:center;gap:14px;">
            <button class="primary-btn" id="importBtn" onclick="runImport()">Format &amp; Import →</button>
            <span id="importStatus" style="font-size:13px;color:var(--text-2);"></span>
          </div>
        </div>
      </div>

      <div id="importResult" style="display:none;margin-top:8px;" class="notice success">
        <div class="notice-title" id="importResultTitle">Imported successfully</div>
        <div id="importResultBody" style="color:var(--text);"></div>
      </div>
      <div id="importError" style="display:none;margin-top:8px;" class="notice danger"></div>`;
  }

  function copyPrompt() {
    const text = document.getElementById('perplexityPrompt')?.textContent || '';
    navigator.clipboard.writeText(text).catch(() => {});
  }

  async function runImport() {
    const researchTopic = document.getElementById('importResearchTopic')?.value.trim();
    const researchText  = document.getElementById('importResearchText')?.value.trim();
    const btn           = document.getElementById('importBtn');
    const status        = document.getElementById('importStatus');
    const resultBox     = document.getElementById('importResult');
    const resultTitle   = document.getElementById('importResultTitle');
    const resultBody    = document.getElementById('importResultBody');
    const errorBox      = document.getElementById('importError');

    errorBox.style.display  = 'none';
    resultBox.style.display = 'none';

    if (!researchText || researchText.length < 100) {
      errorBox.style.display='block';
      errorBox.textContent='Paste the Perplexity research output (needs at least 100 characters).';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Formatting…';
    status.textContent = 'Claude Sonnet is reading the research and building each product schema…';

    try {
      const r = await fetch('/api/admin-import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_session.access_token}` },
        body: JSON.stringify({ researchTopic, researchText, accessToken: _session.access_token }),
      });
      const data = await r.json();
      if (!r.ok) {
        let msg = data.error || `Server ${r.status}`;
        if (data.hint) msg += '\n' + data.hint;
        if (data.raw_preview) msg += '\n\nResponse preview: ' + data.raw_preview;
        throw new Error(msg);
      }

      status.textContent = '';
      const products = data.products || [];
      resultTitle.textContent = `Imported ${products.length} product${products.length !== 1 ? 's' : ''} successfully`;
      resultBox.style.display = 'block';
      resultBody.innerHTML = products.map((p, i) => `
        <div style="${i > 0 ? 'margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,0,0,.08);' : ''}">
          <div style="font-weight:600;margin-bottom:4px;">${esc(p.productName || p.slug)}</div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;">
            <span>${badgePill(p.badge)}</span>
            <span>Score: <strong>${p.overallScore ?? '—'}/10</strong></span>
            <a href="/p/${esc(p.slug)}" target="_blank" style="color:var(--success)">/p/${esc(p.slug)}</a>
            ${p.error ? `<span style="color:var(--danger)">${esc(p.error)}</span>` : ''}
          </div>
          ${p.tldr ? `<div style="font-size:12px;color:var(--text-2);margin-top:4px;">${esc(p.tldr)}</div>` : ''}
        </div>`).join('');

      document.getElementById('importResearchTopic').value = '';
      document.getElementById('importResearchText').value = '';
    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.style.whiteSpace = 'pre-wrap';
      errorBox.textContent = err.message;
      status.textContent = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Format & Import →';
    }
  }

  init();
</script>
</body>
</html>
